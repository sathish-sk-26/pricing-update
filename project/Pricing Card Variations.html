<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Pricing card · 5 variations</title>
<link rel="stylesheet" href="highrise/colors_and_type.css" />
<link rel="stylesheet" href="highrise/highrise.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: var(--hr-font-sans); color: var(--hr-text-neutral-title-1, #181c22); }
  * { box-sizing: border-box; }

  /* ── Shared building blocks for every variation ── */
  .pc {
    background: #fff;
    border: 1px solid var(--hr-border-neutral-subtle-1, #eaecf0);
    border-radius: 12px;
    box-shadow: 0 1px 2px rgb(16 24 40 / 0.04);
    overflow: hidden;
  }
  .pc-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 20px 24px 16px 24px;
    gap: 16px;
  }
  .pc-header .meta h3 {
    margin: 0 0 4px 0;
    font-size: 16px; font-weight: 600; letter-spacing: -0.1px;
    color: var(--hr-gray-900, #181c22);
  }
  .pc-header .meta p {
    margin: 0;
    font-size: 13px; color: var(--hr-gray-500, #6d778d); line-height: 1.5;
  }
  .btn-add {
    display: inline-flex; align-items: center; gap: 6px;
    height: 36px; padding: 0 14px;
    border: 1px solid var(--hr-primary-500, #1c6dff);
    color: var(--hr-primary-600, #0056d2);
    background: #fff;
    border-radius: 8px;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: background 120ms;
    white-space: nowrap;
  }
  .btn-add:hover { background: var(--hr-primary-50, #ecf3ff); }
  .btn-add svg { width: 14px; height: 14px; }

  .icon-btn {
    width: 28px; height: 28px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 6px; cursor: pointer; color: var(--hr-gray-500, #6d778d);
    border: none; background: transparent;
    transition: background 120ms, color 120ms;
  }
  .icon-btn:hover { background: var(--hr-gray-100, #f1f3f7); color: var(--hr-gray-700, #404755); }
  .icon-btn.danger:hover { color: var(--hr-error-600, #af2e25); background: var(--hr-error-50, #fdeceb); }
  .icon-btn svg { width: 16px; height: 16px; }

  /* Tags */
  .tag {
    display: inline-flex; align-items: center; gap: 6px;
    height: 22px; padding: 0 8px;
    font-size: 11px; font-weight: 500; letter-spacing: 0.1px;
    border-radius: 6px;
    border: 1px solid var(--hr-gray-200, #eaecf0);
    background: var(--hr-gray-50, #f7f8fa);
    color: var(--hr-gray-700, #404755);
  }
  .tag .dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }
  .tag.tier-free   { color: var(--hr-gray-700, #404755); background: var(--hr-gray-50, #f7f8fa); border-color: var(--hr-gray-200, #eaecf0); }
  .tag.tier-pro    { color: var(--hr-primary-700, #003f9c); background: var(--hr-primary-50, #ecf3ff); border-color: var(--hr-primary-100, #d6e4ff); }
  .tag.tier-agency { color: var(--hr-purple-700, #5a2bc9); background: var(--hr-purple-50, #f4eeff); border-color: var(--hr-purple-100, #e3d6ff); }
  .tag.tier-usage  { color: var(--hr-teal-700, #045863); background: var(--hr-teal-50, #ecf9fa); border-color: var(--hr-teal-100, #cdeff2); }

  .mono { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

  /* ───────────────────────────────────────────────
     V1 — Refined table (closest to current)
     ─────────────────────────────────────────────── */
  .v1 .pc-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .v1 .pc-table thead th {
    text-align: left; padding: 10px 24px;
    font-size: 11px; font-weight: 500; letter-spacing: 0.4px; text-transform: uppercase;
    color: var(--hr-gray-500, #6d778d);
    background: var(--hr-gray-25, #fafbfc);
    border-top: 1px solid var(--hr-border-neutral-subtle-1, #eaecf0);
    border-bottom: 1px solid var(--hr-border-neutral-subtle-1, #eaecf0);
  }
  .v1 .pc-table tbody td {
    padding: 14px 24px; vertical-align: middle;
    border-bottom: 1px solid var(--hr-border-neutral-subtle-1, #f1f3f7);
    color: var(--hr-gray-700, #404755);
  }
  .v1 .pc-table tbody tr:last-child td { border-bottom: none; }
  .v1 .pc-table tbody tr:hover td { background: var(--hr-gray-25, #fafbfc); }
  .v1 .pname { display: inline-flex; align-items: center; gap: 10px; color: var(--hr-gray-900, #181c22); font-weight: 500; }
  .v1 .pname .swatch { width: 8px; height: 8px; border-radius: 2px; }
  .v1 .price { color: var(--hr-gray-900, #181c22); font-weight: 500; }
  .v1 .price small { color: var(--hr-gray-500, #6d778d); font-weight: 400; margin-left: 2px; }
  .v1 .actions { display: flex; gap: 2px; justify-content: flex-end; }
  .v1 .pc-table td:last-child, .v1 .pc-table th:last-child { text-align: right; }

  /* ───────────────────────────────────────────────
     V2 — Plan rows (no table chrome, denser cards)
     ─────────────────────────────────────────────── */
  .v2 .plan-row {
    display: grid;
    grid-template-columns: 4px 1fr auto auto 80px;
    align-items: center;
    gap: 20px;
    padding: 16px 24px 16px 20px;
    border-top: 1px solid var(--hr-border-neutral-subtle-1, #f1f3f7);
    position: relative;
    transition: background 120ms;
  }
  .v2 .plan-row:hover { background: var(--hr-gray-25, #fafbfc); }
  .v2 .plan-row .accent { width: 3px; height: 28px; border-radius: 3px; align-self: center; }
  .v2 .plan-row .info { min-width: 0; }
  .v2 .plan-row .info .top { display: flex; align-items: center; gap: 8px; }
  .v2 .plan-row .info .name { font-size: 14px; font-weight: 600; color: var(--hr-gray-900, #181c22); }
  .v2 .plan-row .info .sub  { margin-top: 3px; font-size: 12px; color: var(--hr-gray-500, #6d778d); }
  .v2 .priceblock { text-align: right; min-width: 110px; }
  .v2 .priceblock .label { font-size: 11px; color: var(--hr-gray-500, #6d778d); text-transform: uppercase; letter-spacing: 0.4px; }
  .v2 .priceblock .v { font-size: 14px; color: var(--hr-gray-900, #181c22); font-weight: 600; margin-top: 2px; }
  .v2 .priceblock .v small { font-size: 11px; color: var(--hr-gray-500, #6d778d); font-weight: 500; margin-left: 2px; }
  .v2 .actions { display: flex; gap: 2px; justify-content: flex-end; }

  /* ───────────────────────────────────────────────
     V3 — Tier columns (marketing-style mini cards)
     ─────────────────────────────────────────────── */
  .v3 .pc-body { padding: 0 24px 24px 24px; }
  .v3 .tier-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  }
  .v3 .tier-card {
    border: 1px solid var(--hr-border-neutral-subtle-1, #eaecf0);
    border-radius: 10px;
    padding: 16px;
    position: relative;
    background: #fff;
    transition: border-color 120ms, box-shadow 120ms;
  }
  .v3 .tier-card:hover { border-color: var(--hr-gray-300, #d6dae3); box-shadow: 0 1px 2px rgb(16 24 40 / 0.04); }
  .v3 .tier-card.featured {
    border-color: var(--hr-primary-300, #93b8ff);
    background: linear-gradient(180deg, var(--hr-primary-25, #f5f9ff) 0%, #fff 60%);
  }
  .v3 .tier-card .top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .v3 .tier-card h4 { margin: 0; font-size: 13px; font-weight: 600; color: var(--hr-gray-900, #181c22); }
  .v3 .row-actions { display: flex; gap: 2px; }
  .v3 .tier-card .price {
    display: flex; align-items: baseline; gap: 4px;
    margin-bottom: 12px;
  }
  .v3 .tier-card .price .amt { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; color: var(--hr-gray-900, #181c22); }
  .v3 .tier-card .price .cy { font-size: 12px; color: var(--hr-gray-500, #6d778d); }
  .v3 .tier-card dl { margin: 0; display: grid; grid-template-columns: 1fr auto; row-gap: 6px; column-gap: 12px; font-size: 12px; }
  .v3 .tier-card dt { color: var(--hr-gray-500, #6d778d); }
  .v3 .tier-card dd { margin: 0; color: var(--hr-gray-800, #2b313b); font-weight: 500; font-variant-numeric: tabular-nums; }
  .v3 .featured-pill {
    position: absolute; top: -8px; right: 14px;
    height: 18px; padding: 0 8px;
    background: var(--hr-primary-600, #0056d2); color: #fff;
    border-radius: 999px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase;
    display: inline-flex; align-items: center;
  }

  /* ───────────────────────────────────────────────
     V4 — Expandable rows (one row expanded inline)
     ─────────────────────────────────────────────── */
  .v4 .exp-row {
    border-top: 1px solid var(--hr-border-neutral-subtle-1, #f1f3f7);
  }
  .v4 .exp-row .head {
    display: grid;
    grid-template-columns: 14px 1.4fr 1fr 1fr 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 14px 24px;
    cursor: pointer;
    transition: background 120ms;
  }
  .v4 .exp-row .head:hover { background: var(--hr-gray-25, #fafbfc); }
  .v4 .chev { color: var(--hr-gray-400, #98a0b0); transition: transform 120ms; }
  .v4 .exp-row.open .chev { transform: rotate(90deg); color: var(--hr-gray-700, #404755); }
  .v4 .exp-row.open .head { background: var(--hr-gray-25, #fafbfc); }
  .v4 .exp-row .pname { font-size: 14px; font-weight: 500; color: var(--hr-gray-900, #181c22); }
  .v4 .exp-row .cell-label { display: block; font-size: 11px; color: var(--hr-gray-500, #6d778d); margin-bottom: 2px; letter-spacing: 0.3px; }
  .v4 .exp-row .v { font-size: 13px; color: var(--hr-gray-800, #2b313b); font-variant-numeric: tabular-nums; }
  .v4 .head-cols-label {
    display: grid;
    grid-template-columns: 14px 1.4fr 1fr 1fr 1fr auto;
    gap: 16px;
    padding: 10px 24px;
    background: var(--hr-gray-25, #fafbfc);
    border-top: 1px solid var(--hr-border-neutral-subtle-1, #eaecf0);
    border-bottom: 1px solid var(--hr-border-neutral-subtle-1, #eaecf0);
    font-size: 11px; font-weight: 500; letter-spacing: 0.4px; text-transform: uppercase;
    color: var(--hr-gray-500, #6d778d);
  }
  .v4 .exp-row .panel {
    padding: 4px 24px 20px 54px;
    background: var(--hr-gray-25, #fafbfc);
    border-top: 1px dashed var(--hr-gray-200, #eaecf0);
    display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
  }
  .v4 .panel .group h5 {
    margin: 0 0 8px 0;
    font-size: 11px; font-weight: 600; color: var(--hr-gray-500, #6d778d); letter-spacing: 0.4px; text-transform: uppercase;
  }
  .v4 .panel ul { margin: 0; padding: 0; list-style: none; display: grid; gap: 6px; font-size: 13px; color: var(--hr-gray-700, #404755); }
  .v4 .panel ul li { display: flex; align-items: center; gap: 8px; }
  .v4 .panel ul li svg { width: 14px; height: 14px; color: var(--hr-success-600, #066d3d); flex: none; }
  .v4 .row-actions-inline { display: flex; gap: 2px; }

  /* ───────────────────────────────────────────────
     V5 — Grouped by charge type (sections)
     ─────────────────────────────────────────────── */
  .v5 .group-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 24px;
    background: var(--hr-gray-25, #fafbfc);
    border-top: 1px solid var(--hr-border-neutral-subtle-1, #eaecf0);
    border-bottom: 1px solid var(--hr-border-neutral-subtle-1, #eaecf0);
  }
  .v5 .group-header .lbl {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 600; color: var(--hr-gray-700, #404755); text-transform: uppercase; letter-spacing: 0.5px;
  }
  .v5 .group-header .lbl .count {
    height: 16px; min-width: 16px; padding: 0 5px;
    border-radius: 999px;
    background: var(--hr-gray-200, #eaecf0); color: var(--hr-gray-700, #404755);
    font-size: 10px; font-weight: 600;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .v5 .group-header .add-mini {
    display: inline-flex; align-items: center; gap: 4px;
    background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 6px;
    font-size: 12px; font-weight: 500; color: var(--hr-primary-600, #0056d2);
  }
  .v5 .group-header .add-mini:hover { background: var(--hr-primary-50, #ecf3ff); }
  .v5 .grow {
    display: grid;
    grid-template-columns: 28px 1.6fr 1fr 1fr 80px;
    align-items: center;
    gap: 16px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--hr-border-neutral-subtle-1, #f1f3f7);
    font-size: 13px;
  }
  .v5 .grow:last-of-type { border-bottom: none; }
  .v5 .grow:hover { background: var(--hr-gray-25, #fafbfc); }
  .v5 .grow .ico {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--hr-gray-100, #f1f3f7);
    color: var(--hr-gray-600, #555c6c);
    display: inline-flex; align-items: center; justify-content: center;
    flex: none;
  }
  .v5 .grow .ico svg { width: 14px; height: 14px; }
  .v5 .grow.tier-pro    .ico { background: var(--hr-primary-50, #ecf3ff); color: var(--hr-primary-600, #0056d2); }
  .v5 .grow.tier-agency .ico { background: var(--hr-purple-50, #f4eeff); color: var(--hr-purple-600, #6b34d6); }
  .v5 .grow.tier-usage  .ico { background: var(--hr-teal-50, #ecf9fa); color: var(--hr-teal-600, #057a86); }
  .v5 .grow .pname { font-weight: 500; color: var(--hr-gray-900, #181c22); }
  .v5 .grow .desc  { font-size: 12px; color: var(--hr-gray-500, #6d778d); margin-top: 2px; }
  .v5 .grow .amt   { font-variant-numeric: tabular-nums; color: var(--hr-gray-800, #2b313b); font-weight: 500; }
  .v5 .grow .amt small { color: var(--hr-gray-500, #6d778d); font-weight: 400; margin-left: 2px; }
  .v5 .grow .actions { display: flex; gap: 2px; justify-content: flex-end; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const { useState } = React;

// ─── Inline SVG icons ────────────────────────────
const IcEdit = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
  </svg>
);
const IcTrash = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="3 6 5 6 21 6"/>
    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
    <path d="M10 11v6M14 11v6"/>
    <path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/>
  </svg>
);
const IcPlus = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
);
const IcChev = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
);
const IcCheck = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
);
const IcGift = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
);
const IcZap = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
);
const IcCrown = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 17l2-10 5 5 2-7 2 7 5-5 2 10z"/><line x1="3" y1="20" x2="21" y2="20"/></svg>
);
const IcMeter = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="14" r="8"/><path d="M12 14l4-4"/><path d="M9 2h6"/></svg>
);

const RowActions = ({ subtle }) => (
  <div className="actions" style={{ display: "flex", gap: 2 }}>
    <button className="icon-btn" aria-label="Edit"><IcEdit/></button>
    <button className="icon-btn danger" aria-label="Delete"><IcTrash/></button>
  </div>
);
const AddPlanBtn = ({ label = "Add plan" }) => (
  <button className="btn-add"><IcPlus/> {label}</button>
);
const CardHeader = ({ title = "Plans", sub = "We support a combination of free and paid plans to help you strategize better." }) => (
  <div className="pc-header">
    <div className="meta">
      <h3>{title}</h3>
      <p>{sub}</p>
    </div>
    <AddPlanBtn />
  </div>
);

// ───────────────────────────────────────────────
// V1 — Refined table
// ───────────────────────────────────────────────
const V1 = () => (
  <div className="pc v1">
    <CardHeader />
    <table className="pc-table">
      <thead>
        <tr>
          <th>Plan name</th>
          <th>Charge type</th>
          <th>Agency amount</th>
          <th>Sub-account amount</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><span className="pname"><span className="swatch" style={{ background: "var(--hr-gray-400)" }}/>Free</span></td>
          <td><span className="tag tier-free"><span className="dot"/>Free</span></td>
          <td className="price mono">—</td>
          <td className="price mono">—</td>
          <td><RowActions/></td>
        </tr>
        <tr>
          <td><span className="pname"><span className="swatch" style={{ background: "var(--hr-primary-500)" }}/>Starter</span></td>
          <td><span className="tag tier-pro"><span className="dot"/>Recurring</span></td>
          <td className="price mono">$29<small>/mo</small></td>
          <td className="price mono">$49<small>/mo</small></td>
          <td><RowActions/></td>
        </tr>
        <tr>
          <td><span className="pname"><span className="swatch" style={{ background: "var(--hr-purple-500)" }}/>Pro</span></td>
          <td><span className="tag tier-agency"><span className="dot"/>Recurring</span></td>
          <td className="price mono">$99<small>/mo</small></td>
          <td className="price mono">$149<small>/mo</small></td>
          <td><RowActions/></td>
        </tr>
        <tr>
          <td><span className="pname"><span className="swatch" style={{ background: "var(--hr-teal-500)" }}/>Agency</span></td>
          <td><span className="tag tier-usage"><span className="dot"/>One-time</span></td>
          <td className="price mono">$499</td>
          <td className="price mono">$799</td>
          <td><RowActions/></td>
        </tr>
      </tbody>
    </table>
  </div>
);

// ───────────────────────────────────────────────
// V2 — Plan rows (no table, accent strip + dual prices)
// ───────────────────────────────────────────────
const PlanRow = ({ accent, name, sub, charge, agency, subacct, agencyCy = "/mo", subCy = "/mo" }) => (
  <div className="plan-row">
    <span className="accent" style={{ background: accent }}/>
    <div className="info">
      <div className="top">
        <span className="name">{name}</span>
        <span className={`tag ${charge.cls}`}><span className="dot"/>{charge.label}</span>
      </div>
      <div className="sub">{sub}</div>
    </div>
    <div className="priceblock">
      <div className="label">Agency</div>
      <div className="v mono">{agency}<small>{agency !== "—" && agencyCy}</small></div>
    </div>
    <div className="priceblock">
      <div className="label">Sub-account</div>
      <div className="v mono">{subacct}<small>{subacct !== "—" && subCy}</small></div>
    </div>
    <RowActions/>
  </div>
);
const V2 = () => (
  <div className="pc v2">
    <CardHeader />
    <PlanRow accent="var(--hr-gray-400)"   name="Free"    sub="Limited workflows · 1 user"        charge={{cls:"tier-free",   label:"Free"}}      agency="—"     subacct="—"/>
    <PlanRow accent="var(--hr-primary-500)" name="Starter" sub="3 modules · 10k contacts"          charge={{cls:"tier-pro",    label:"Recurring"}} agency="$29"  subacct="$49"/>
    <PlanRow accent="var(--hr-purple-500)" name="Pro"     sub="All modules · 100k contacts"       charge={{cls:"tier-agency", label:"Recurring"}} agency="$99"  subacct="$149"/>
    <PlanRow accent="var(--hr-teal-500)"   name="Agency"  sub="White-label · unlimited seats"     charge={{cls:"tier-usage",  label:"One-time"}}  agency="$499" subacct="$799" agencyCy="" subCy=""/>
  </div>
);

// ───────────────────────────────────────────────
// V3 — Tier columns
// ───────────────────────────────────────────────
const TierCard = ({ title, price, cy, agency, sub, charge, featured }) => (
  <div className={`tier-card${featured ? " featured" : ""}`}>
    {featured && <span className="featured-pill">Most installed</span>}
    <div className="top">
      <h4>{title}</h4>
      <div className="row-actions">
        <button className="icon-btn" aria-label="Edit"><IcEdit/></button>
        <button className="icon-btn danger" aria-label="Delete"><IcTrash/></button>
      </div>
    </div>
    <div className="price">
      <span className="amt mono">{price}</span>
      <span className="cy">{cy}</span>
    </div>
    <dl>
      <dt>Charge</dt><dd>{charge}</dd>
      <dt>Agency</dt><dd className="mono">{agency}</dd>
      <dt>Sub-account</dt><dd className="mono">{sub}</dd>
    </dl>
  </div>
);
const V3 = () => (
  <div className="pc v3">
    <CardHeader />
    <div className="pc-body">
      <div className="tier-grid">
        <TierCard title="Free"    price="$0"   cy="forever"  charge="Free"      agency="—"     sub="—"/>
        <TierCard title="Starter" price="$29"  cy="per month" charge="Recurring" agency="$29"   sub="$49"     featured/>
        <TierCard title="Pro"     price="$99"  cy="per month" charge="Recurring" agency="$99"   sub="$149"/>
      </div>
    </div>
  </div>
);

// ───────────────────────────────────────────────
// V4 — Expandable rows
// ───────────────────────────────────────────────
const ExpRow = ({ name, charge, chargeCls, agency, sub, open, onToggle, details }) => (
  <div className={`exp-row${open ? " open" : ""}`}>
    <div className="head" onClick={onToggle}>
      <span className="chev"><IcChev/></span>
      <span className="pname">{name}</span>
      <span><span className={`tag ${chargeCls}`}><span className="dot"/>{charge}</span></span>
      <span className="v mono">{agency}</span>
      <span className="v mono">{sub}</span>
      <span className="row-actions-inline">
        <button className="icon-btn" aria-label="Edit" onClick={e => e.stopPropagation()}><IcEdit/></button>
        <button className="icon-btn danger" aria-label="Delete" onClick={e => e.stopPropagation()}><IcTrash/></button>
      </span>
    </div>
    {open && (
      <div className="panel">
        <div className="group">
          <h5>What's included</h5>
          <ul>
            {details.features.map((f, i) => <li key={i}><IcCheck/>{f}</li>)}
          </ul>
        </div>
        <div className="group">
          <h5>Billing</h5>
          <ul>
            <li><span style={{ color: "var(--hr-gray-500)", minWidth: 96 }}>Trial</span><span>{details.trial}</span></li>
            <li><span style={{ color: "var(--hr-gray-500)", minWidth: 96 }}>Billing cycle</span><span>{details.cycle}</span></li>
            <li><span style={{ color: "var(--hr-gray-500)", minWidth: 96 }}>Proration</span><span>{details.proration}</span></li>
          </ul>
        </div>
      </div>
    )}
  </div>
);
const V4 = () => {
  const [openIdx, setOpenIdx] = useState(1);
  const rows = [
    { name: "Free", charge: "Free", chargeCls: "tier-free", agency: "—", sub: "—",
      details: { features: ["Contacts (up to 250)", "Workflows (3 active)", "Email support"], trial: "Not applicable", cycle: "—", proration: "—" } },
    { name: "Starter", charge: "Recurring", chargeCls: "tier-pro", agency: "$29/mo", sub: "$49/mo",
      details: { features: ["Contacts (10k)", "Workflows (unlimited)", "All modules", "Priority email support"], trial: "14 days", cycle: "Monthly · auto-renew", proration: "Daily, when upgrading" } },
    { name: "Pro", charge: "Recurring", chargeCls: "tier-agency", agency: "$99/mo", sub: "$149/mo",
      details: { features: ["Contacts (100k)", "API access", "Custom branding", "Priority chat support"], trial: "14 days", cycle: "Monthly · auto-renew", proration: "Daily, when upgrading" } },
  ];
  return (
    <div className="pc v4">
      <CardHeader />
      <div className="head-cols-label">
        <span></span><span>Plan</span><span>Charge type</span><span>Agency</span><span>Sub-account</span><span></span>
      </div>
      {rows.map((r, i) => (
        <ExpRow key={i} {...r} open={openIdx === i} onToggle={() => setOpenIdx(openIdx === i ? -1 : i)} />
      ))}
    </div>
  );
};

// ───────────────────────────────────────────────
// V5 — Grouped by charge type
// ───────────────────────────────────────────────
const GroupHeader = ({ label, count, addLabel = "Add" }) => (
  <div className="group-header">
    <span className="lbl">{label}<span className="count">{count}</span></span>
    <button className="add-mini"><IcPlus/>{addLabel}</button>
  </div>
);
const GRow = ({ tier, icon, name, desc, agency, sub, cy }) => (
  <div className={`grow tier-${tier}`}>
    <span className="ico">{icon}</span>
    <div>
      <div className="pname">{name}</div>
      <div className="desc">{desc}</div>
    </div>
    <div className="amt">{agency}{cy && <small>{cy}</small>}</div>
    <div className="amt">{sub}{cy && <small>{cy}</small>}</div>
    <div className="actions">
      <button className="icon-btn" aria-label="Edit"><IcEdit/></button>
      <button className="icon-btn danger" aria-label="Delete"><IcTrash/></button>
    </div>
  </div>
);
const V5 = () => (
  <div className="pc v5">
    <CardHeader />
    <div className="head-cols-label" style={{ display: "grid", gridTemplateColumns: "28px 1.6fr 1fr 1fr 80px", gap: 16, padding: "10px 24px", background: "var(--hr-gray-25, #fafbfc)", borderTop: "1px solid var(--hr-border-neutral-subtle-1, #eaecf0)", borderBottom: "1px solid var(--hr-border-neutral-subtle-1, #eaecf0)", fontSize: 11, fontWeight: 500, letterSpacing: "0.4px", textTransform: "uppercase", color: "var(--hr-gray-500, #6d778d)" }}>
      <span></span><span>Plan</span><span>Agency</span><span>Sub-account</span><span></span>
    </div>
    <GroupHeader label="Free" count={1} addLabel="Add free plan"/>
    <GRow tier="free"   icon={<IcGift/>}  name="Free"    desc="Default tier for every install" agency="—" sub="—"/>
    <GroupHeader label="Recurring" count={2} addLabel="Add recurring"/>
    <GRow tier="pro"    icon={<IcZap/>}   name="Starter" desc="3 modules · 10k contacts"       agency="$29"  sub="$49"  cy="/mo"/>
    <GRow tier="agency" icon={<IcCrown/>} name="Pro"     desc="All modules · 100k contacts"    agency="$99"  sub="$149" cy="/mo"/>
    <GroupHeader label="Usage-based" count={1} addLabel="Add meter"/>
    <GRow tier="usage"  icon={<IcMeter/>} name="Workflow API"  desc="Charged per message sent"  agency="$0.02" sub="$0.04" cy="/msg"/>
  </div>
);

// ─── Canvas layout ─────────────────────────────
const App = () => (
  <DesignCanvas>
    <DCSection
      id="pricing-card"
      title="Pricing — Plans card · 5 variations"
      subtitle="Each artboard shows the same card from the Pricing screen with realistic plans. Tap a card to fullscreen-focus it."
    >
      <DCArtboard id="v1" label="01 · Refined table" width={920} height={360}>
        <div style={{ padding: 20, background: "var(--hr-gray-50, #f7f8fa)", width: "100%", height: "100%" }}>
          <V1/>
        </div>
      </DCArtboard>
      <DCArtboard id="v2" label="02 · Accent rows" width={920} height={400}>
        <div style={{ padding: 20, background: "var(--hr-gray-50, #f7f8fa)", width: "100%", height: "100%" }}>
          <V2/>
        </div>
      </DCArtboard>
      <DCArtboard id="v3" label="03 · Tier columns" width={920} height={330}>
        <div style={{ padding: 20, background: "var(--hr-gray-50, #f7f8fa)", width: "100%", height: "100%" }}>
          <V3/>
        </div>
      </DCArtboard>
      <DCArtboard id="v4" label="04 · Expandable detail" width={920} height={460}>
        <div style={{ padding: 20, background: "var(--hr-gray-50, #f7f8fa)", width: "100%", height: "100%" }}>
          <V4/>
        </div>
      </DCArtboard>
      <DCArtboard id="v5" label="05 · Grouped by charge type" width={920} height={510}>
        <div style={{ padding: 20, background: "var(--hr-gray-50, #f7f8fa)", width: "100%", height: "100%" }}>
          <V5/>
        </div>
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
